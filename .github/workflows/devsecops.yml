name: DevSecOps Pipeline

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

permissions:
  contents: read
  packages: write
  issues: write              # ZAP cria issue com findings

jobs:
  # ============================================
  # Stage 1: Lint (Análise Estática)
  # ============================================
  lint:
    name: "🔍 ESLint - Análise Estática"
    runs-on: ubuntu-latest
    steps:
      - name: Checkout do código
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"

      - name: Instalar dependências
        run: npm ci

      - name: Executar ESLint
        run: npm run lint

  # ============================================
  # Stage 2: Semgrep (SAST - Security Analysis)
  # ============================================
  semgrep:
    name: "🔎 Semgrep - SAST"
    runs-on: ubuntu-latest
    needs: lint                       # Roda após o lint
    container:
      image: semgrep/semgrep          # Imagem oficial do Semgrep
    steps:
      - name: Checkout do código
        uses: actions/checkout@v4

      - name: Semgrep Scan
        run: semgrep scan --config p/owasp-top-ten --error
        env:
          SEMGREP_RULES: p/owasp-top-ten

  # ============================================
  # Stage 3: Testes Unitários
  # ============================================
  test:
    name: "🧪 Jest - Testes Unitários"
    runs-on: ubuntu-latest
    needs: semgrep # Só roda se o lint passar
    steps:
      - name: Checkout do código
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"

      - name: Instalar dependências
        run: npm ci

      - name: Executar testes com cobertura
        run: npm test

      - name: Upload do relatório de cobertura
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: coverage/

  # ============================================
  # Stage 4: Build Docker
  # ============================================
  build:
    name: "🐳 Docker Build + Push"
    runs-on: ubuntu-latest
    needs: test
    steps:
      - name: Checkout do código
        uses: actions/checkout@v4

      - name: Build da imagem Docker
        run: docker build -t devsecops-lab-a2:${{ github.sha }} .

      - name: Verificar tamanho da imagem
        run: |
          docker images devsecops-lab-a2:${{ github.sha }} --format "Tamanho: {{.Size}}"

      - name: Login no GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Tag da imagem para GHCR
        run: |
          docker tag devsecops-lab-a2:${{ github.sha }} \
            ghcr.io/${{ github.repository }}:${{ github.sha }}
          docker tag devsecops-lab-a2:${{ github.sha }} \
            ghcr.io/${{ github.repository }}:latest

      - name: Push para GHCR
        run: |
          docker push ghcr.io/${{ github.repository }}:${{ github.sha }}
          docker push ghcr.io/${{ github.repository }}:latest

      - name: Salvar imagem como artefato
        run: docker save devsecops-lab-a2:${{ github.sha }} -o image.tar

      - name: Upload do artefato
        uses: actions/upload-artifact@v4
        with:
          name: docker-image
          path: image.tar
          retention-days: 1

  # ============================================
  # Stage 5: Security Scan (Trivy SCA)
  # ============================================
  security-scan:
    name: "🛡️ Trivy - Security Scan"
    runs-on: ubuntu-latest
    needs: build # Só roda após o build
    steps:
      - name: Checkout do código
        uses: actions/checkout@v4

      - name: Download da imagem Docker
        uses: actions/download-artifact@v4
        with:
          name: docker-image

      - name: Carregar imagem Docker
        run: docker load -i image.tar

      # Scan de dependências (filesystem)
      - name: "Trivy: Scan de dependências (SCA)"
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: fs
          scan-ref: .
          severity: HIGH,CRITICAL
          format: table

      # Scan de secrets (credenciais hardcoded)
      - name: "Trivy: Secret Scanning"
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: fs
          scan-ref: .
          scanners: secret
          exit-code: 1

      # Scan da imagem Docker
      - name: "Trivy: Scan da imagem Docker"
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: devsecops-lab-a2:${{ github.sha }}
          severity: HIGH,CRITICAL
          format: table

  # ============================================
  # Stage 6: Security Gate
  # ============================================
  security-gate:
    name: "🚨 Security Gate"
    runs-on: ubuntu-latest
    needs: security-scan
    steps:
      - name: Checkout do código
        uses: actions/checkout@v4

      - name: "Gate: Bloquear se CRITICAL encontrado"
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: fs
          scan-ref: .
          severity: CRITICAL
          exit-code: 1
          format: table

      - name: "✅ Pipeline aprovado"
        if: success()
        run: |
          echo "========================================="
          echo "  ✅ PIPELINE DEVSECOPS APROVADO"
          echo "  Todos os checks passaram:"
          echo "    ✓ Lint (ESLint)"
          echo "    ✓ Testes unitários (Jest)"
          echo "    ✓ Build Docker"
          echo "    ✓ Security Scan (Trivy)"
          echo "    ✓ Security Gate (sem CRITICAL)"
          echo "========================================="

  # ============================================
  # Stage 7: Deploy K8s (Kind)
  # ============================================
  deploy-k8s:
    name: "🚀 Deploy K8s (Kind)"
    runs-on: ubuntu-latest
    needs: security-gate
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    steps:
      - name: Checkout do código
        uses: actions/checkout@v4

      - name: Criar cluster Kind
        uses: helm/kind-action@v1
        with:
          cluster_name: devsecops

      - name: Pull image do GHCR
        run: |
          docker pull ghcr.io/${{ github.repository }}:latest
          echo "Image pulled from GHCR"

      - name: Re-tag e carregar no Kind
        run: |
          docker tag ghcr.io/${{ github.repository }}:latest devsecops-app:local
          kind load docker-image devsecops-app:local --name devsecops
          echo "Image loaded into Kind"

      - name: Deploy manifests K8s
        run: |
          kubectl apply -f k8s/configmap.yaml
          kubectl apply -f k8s/secret.yaml
          kubectl apply -f k8s/postgres-deployment.yaml
          kubectl apply -f k8s/postgres-service.yaml
          kubectl apply -f k8s/app-deployment.yaml
          kubectl apply -f k8s/app-service.yaml
          echo "All manifests applied"

      - name: Aguardar rollout
        run: |
          kubectl rollout status deployment/postgres --timeout=120s
          kubectl rollout status deployment/devsecops-app --timeout=120s
          echo "All deployments ready"

      - name: Inicializar banco
        run: |
          kubectl apply -f k8s/init-db-job.yaml
          kubectl wait --for=condition=complete job/init-db --timeout=60s
          echo "Database initialized"

      # Nota: o server.js agora faz auto-init com CREATE TABLE IF NOT EXISTS.
      # O Job K8s é redundante mas demonstra o conceito de Job.
      # Em produção: use migrations (Flyway, Knex) em vez de init scripts.

      - name: Health check
        run: |
          kubectl port-forward svc/devsecops-svc 8080:80 &
          sleep 5
          HTTP_STATUS=$(curl -s -o /dev/null -w "%{http_code}" http://localhost:8080/health)
          if [ "$HTTP_STATUS" = "200" ]; then
            echo "✅ Health check passed: $HTTP_STATUS"
          else
            echo "❌ Health check failed: $HTTP_STATUS"
            kubectl get pods
            kubectl logs -l app=devsecops --tail=20
            exit 1
          fi

      - name: Teste de endpoint
        run: |
          # Testar criação de mensagem
          curl -s -X POST http://localhost:8080/api/messages \
            -H "Content-Type: application/json" \
            -d '{"text": "Hello from CI/CD Kind!"}' | jq .
          # Listar mensagens
          curl -s http://localhost:8080/api/messages | jq .
          echo "✅ Endpoint tests passed"

  # ============================================
  # Stage 8: Deploy Render (PaaS)
  # ============================================
  deploy-render:
    name: "🚀 Deploy Render"
    runs-on: ubuntu-latest
    needs: security-gate
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    steps:
      - name: Trigger Render deploy
        run: |
          HTTP_STATUS=$(curl -s -o /dev/null -w "%{http_code}" \
            -X POST "${{ secrets.RENDER_DEPLOY_HOOK }}")
          echo "Deploy hook response: $HTTP_STATUS"

      - name: Aguardar deploy + health check
        run: |
          echo "Aguardando 90s para Render deployar..."
          sleep 90
          for i in $(seq 1 5); do
            STATUS=$(curl -s -o /dev/null -w "%{http_code}" \
              "${{ secrets.RENDER_URL }}/health")
            if [ "$STATUS" = "200" ]; then
              echo "✅ Health check passed (attempt $i)"
              exit 0
            fi
            echo "Attempt $i: status $STATUS, retrying in 15s..."
            sleep 15
          done
          echo "❌ Health check failed after 5 attempts"
          exit 1

  # ============================================
  # Stage 9: DAST (OWASP ZAP Baseline)
  # ============================================
  dast:
    name: "🔍 ZAP Baseline Scan"
    runs-on: ubuntu-latest
    needs: deploy-render
    steps:
      - name: Checkout (para .zap-rules.tsv)
        uses: actions/checkout@v4

      - name: ZAP Baseline Scan
        uses: zaproxy/action-baseline@v0.14.0
        with:
          target: ${{ secrets.RENDER_URL }}/health
          rules_file_name: .zap-rules.tsv
          cmd_options: '-j'
          fail_action: false             # true = bloqueia, false = reporta sem bloquear
          artifact_name: zap-report

      - name: Upload ZAP Report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: zap-baseline-report
          path: report_html.html
          retention-days: 30